<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<title>Ujjwal & Gouravi — Wedding Celebration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
:root{
  --gold:#C9A96E;--gold-light:#E8D5AA;--gold-dark:#A07840;
  --cream:#FAF7F2;--dark:#1C1810;--muted:#8B7D6B;
}
body{
  min-height:100vh;
  background:var(--cream);
  font-family:'Montserrat',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(201,169,110,0.09) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(192,57,43,0.05) 0%,transparent 60%);pointer-events:none;z-index:0;}
.page{position:relative;z-index:1;width:100%;max-width:600px;margin:0 auto;padding:1.2rem;}

.card{
  background:#fff;
  border:3px solid var(--gold);
  border-radius:4px;
  padding:2.6rem 2rem 2.4rem;
  text-align:center;
  position:relative;
}
.card::before{content:'';position:absolute;inset:9px;border:1px solid rgba(201,169,110,0.28);border-radius:2px;pointer-events:none;}
.card::after{content:'';position:absolute;inset:15px;border:0.5px solid rgba(201,169,110,0.12);border-radius:1px;pointer-events:none;}

.corner{position:absolute;width:34px;height:34px;}
.corner svg{width:100%;height:100%;}
.c-tl{top:5px;left:5px;} .c-tr{top:5px;right:5px;transform:scaleX(-1);} .c-bl{bottom:5px;left:5px;transform:scaleY(-1);} .c-br{bottom:5px;right:5px;transform:scale(-1,-1);}

.main-heading{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(24px,6vw,40px);
  font-weight:700;color:var(--dark);
  line-height:1.2;letter-spacing:0.5px;margin-bottom:4px;
}
.main-heading .amp{color:var(--gold);font-style:italic;font-weight:400;}
.sub-heading{
  font-family:'Montserrat',sans-serif;
  font-size:10px;letter-spacing:5px;
  text-transform:uppercase;font-weight:300;
  color:var(--muted);margin-top:4px;
}

.divider{display:flex;align-items:center;gap:10px;margin:1.1rem auto;max-width:320px;}
.divider-line{flex:1;height:1.5px;background:linear-gradient(to right,transparent,var(--gold),transparent);}
.divider-icon{color:var(--gold);font-size:14px;flex-shrink:0;}

@keyframes shimmer{to{background-position:300% center;}}

.save-label{
  font-family:'Montserrat',sans-serif;
  font-size:10px;letter-spacing:7px;
  text-transform:uppercase;font-weight:500;
  background:linear-gradient(90deg,#C0392B,#C9A96E,#8E44AD,#C0392B);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s linear infinite;
  display:block;margin-bottom:6px;
}
.wedding-date{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-weight:700;letter-spacing:4px;
  background:linear-gradient(90deg,#C0392B 0%,#C9A96E 45%,#8E44AD 85%,#C0392B 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3.5s linear infinite;
  display:block;
}

.photo-wrap{
  margin:1.3rem auto;
  width:min(230px, 65vw);
  position:relative;
}
.photo-wrap::before{content:'';position:absolute;inset:-7px;border:2px solid var(--gold);border-radius:3px;pointer-events:none;}
.photo-wrap::after{content:'';position:absolute;inset:-13px;border:0.5px solid rgba(201,169,110,0.3);border-radius:4px;pointer-events:none;}
.couple-img{width:100%;display:block;border-radius:1px;}

.countdown-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  max-width:420px;
  margin:0 auto;
}
.count-box{
  border:2.5px solid var(--gold);
  border-radius:3px;
  padding:0.9rem 0.2rem 0.7rem;
  position:relative;background:#fff;
}
.count-box::before{content:'';position:absolute;inset:4px;border:0.5px solid rgba(201,169,110,0.18);border-radius:1px;pointer-events:none;}
.count-num{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,7vw,44px);
  font-weight:700;
  background:linear-gradient(135deg,#C0392B,#C9A96E,#8E44AD);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;display:block;
}
.count-sep{display:block;width:18px;height:1px;background:var(--gold-light);margin:4px auto;}
.count-label{font-size:7px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;font-weight:400;}

.quote-wrap{
  margin-top:1.6rem;
  padding:1.1rem 1.2rem;
  border:1.5px solid rgba(201,169,110,0.4);
  border-radius:3px;
  position:relative;
  background:rgba(201,169,110,0.04);
}
.quote-wrap::before{
  content:'“';
  font-family:'Cormorant Garamond',serif;
  font-size:60px;line-height:1;
  color:var(--gold);opacity:0.35;
  position:absolute;top:-10px;left:12px;
}
.quote-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(15px,3.5vw,18px);
  font-weight:700;font-style:italic;
  line-height:1.55;
  background:linear-gradient(90deg,#C0392B,#A07840,#8E44AD);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.3px;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeIn 0.8s ease both;}
.count-box{animation:fadeIn 0.6s ease both;}
.count-box:nth-child(1){animation-delay:0.1s;}.count-box:nth-child(2){animation-delay:0.2s;}.count-box:nth-child(3){animation-delay:0.3s;}.count-box:nth-child(4){animation-delay:0.4s;}
.quote-wrap{animation:fadeIn 0.7s ease 0.5s both;}

/* Mobile specific */
@media(max-width:400px){
  .card{padding:2rem 0.9rem 2rem;}
  .save-label{letter-spacing:4px;font-size:9px;}
  .wedding-date{font-size:22px;letter-spacing:2px;}
  .countdown-grid{gap:7px;}
  .count-box{padding:0.8rem 0.1rem 0.6rem;}
}
</style>
</head>

<script>
const wedding = new Date('2026-06-27T00:00:00');
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const diff = wedding - new Date();
  if(diff<=0){
    ['days','hours','min','sec'].forEach(u=>document.getElementById('cd-'+u).textContent='00');
    return;
  }
  document.getElementById('cd-days').textContent = Math.floor(diff/86400000);
  document.getElementById('cd-hours').textContent = pad(Math.floor((diff%86400000)/3600000));
  document.getElementById('cd-min').textContent   = pad(Math.floor((diff%3600000)/60000));
  document.getElementById('cd-sec').textContent   = pad(Math.floor((diff%60000)/1000));
}
tick();setInterval(tick,1000);
</script>
